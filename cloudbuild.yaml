steps:
  # 1. Build & Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Backend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/heliora-backend', './backend']
  
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Backend'
    args: ['push', 'gcr.io/$PROJECT_ID/heliora-backend']

  # 2. Deploy Backend to Cloud Run (to ensure it exists and get URL)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'heliora-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/heliora-backend'
      - '--region'
      - 'asia-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'vertex-express@oneclaw-486705.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'DATABASE_URL=$_DATABASE_URL,GEMINI_API_KEY=$_GEMINI_API_KEY,GEMINI_MODEL=$_GEMINI_MODEL,NODE_ENV=production,CORS_ORIGIN=*'


  # 3. Build Frontend (with the backend URL)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Frontend'
    args: [
      'build',
      '--build-arg', 'VITE_API_URL=$_VITE_API_URL',
      '--build-arg', 'VITE_PRIVY_APP_ID=$_VITE_PRIVY_APP_ID',
      '-t', 'gcr.io/$PROJECT_ID/heliora-frontend',
      './frontend'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Frontend'
    args: ['push', 'gcr.io/$PROJECT_ID/heliora-frontend']

  # 4. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'heliora-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/heliora-frontend'
      - '--region'
      - 'asia-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'vertex-express@oneclaw-486705.iam.gserviceaccount.com'


images:
  - 'gcr.io/$PROJECT_ID/heliora-backend'
  - 'gcr.io/$PROJECT_ID/heliora-frontend'

options:
  logging: CLOUD_LOGGING_ONLY
