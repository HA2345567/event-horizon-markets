steps:
  # 1. Build & Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Backend'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/heliora-backend', './backend']
  
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Backend'
    args: ['push', 'gcr.io/$PROJECT_ID/heliora-backend']

  # 2. Deploy Backend to Cloud Run (to ensure it exists and get URL)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Backend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'heliora-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/heliora-backend'
      - '--region'
      - 'asia-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'DATABASE_URL=postgresql://neondb_owner:npg_Bvnra4CeN9lj@ep-young-morning-aqw1y9bj-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require,GEMINI_API_KEY=REPLACE_WITH_ACTUAL_KEY,GEMINI_MODEL=gemini-3-flash-preview,NODE_ENV=production,CORS_ORIGIN=*'

  # 3. Build Frontend (with the backend URL)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Frontend'
    args: [
      'build',
      '--build-arg', 'VITE_API_URL=https://heliora-backend-40377961468.asia-east1.run.app',
      '--build-arg', 'VITE_PRIVY_APP_ID=cmooj9sxq009x0djo8i0uld15',
      '-t', 'gcr.io/$PROJECT_ID/heliora-frontend',
      './frontend'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Frontend'
    args: ['push', 'gcr.io/$PROJECT_ID/heliora-frontend']

  # 4. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Frontend'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'heliora-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/heliora-frontend'
      - '--region'
      - 'asia-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/heliora-backend'
  - 'gcr.io/$PROJECT_ID/heliora-frontend'

options:
  logging: CLOUD_LOGGING_ONLY
