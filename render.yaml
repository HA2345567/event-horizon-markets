services:
  - type: web
    name: heliora-backend
    env: docker
    plan: free
    rootDir: backend
    dockerFilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: DISABLE_AI
        value: "true"

  - type: web
    name: heliora-frontend
    env: static
    rootDir: frontend
    buildCommand: bun install && bun run build
    publishDir: dist
    routes:
      - type: rewrite
        src: /*
        dest: /index.html


